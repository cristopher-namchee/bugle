name: Send daily bug report to GLChat channel

on:
  workflow_dispatch:
  # schedule:
  # - cron: "0 3 * * *"

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daily script
        run: pnpm run build

      - name: Run daily script
        run: node ./dist/scheduler/daily.mjs
        env:
          DAILY_GOOGLE_SPACE: ${{ vars.DAILY_GOOGLE_SPACE }}
          SCRIPT_URL: ${{ vars.SCRIPT_URL }}
          SHIFT_URL: ${{ vars.SHIFT_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SERVICE_ACCOUNT_EMAIL: ${{ vars.SERVICE_ACCOUNT_EMAIL }}
          SERVICE_ACCOUNT_PRIVATE_KEY: ${{ secrets.SERVICE_ACCOUNT_PRIVATE_KEY }}
